networks:
  inception:
    driver: bridge

volumes:
  wordpress:
    name: wordpress
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mbernard/data/wordpress

# website:
#   name: website
#   driver: local
#   driver_opts:
#     type: none
#     o: bind
#     device: /home/mbernard/data/website

  mariadb:
    name: mariadb
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/mbernard/data/mariadb
  
services:
  mariadb:
    image: mariadb
    container_name: mariadb
    build: ./requirements/mariadb/.
    env_file:
      - .env
    volumes:
      - mariadb:/var/lib/mysql
    networks:
      - inception
    expose:
      - "3306:3306"
    restart: unless-stopped

  wordpress:
    image: wordpress
    container_name: wordpress
    build: requirements/wordpress/ .
    env_file:
      - .env
    volumes:
      -wordpress:/var/www/html
    networks:
      - inception
    restart: on-failure
    depends-on: mariadb

  nginx:
    image: nginx
    container_name: nginx
    build: requirements/nginx/ .
    env_file:
      - .env
    volumes:
      - wordpress:/var/www/html
        #  - website:/var/www/resume
      - /var/log/nginx:/var/log/nginx
    ports:
      - "443:443"
    networks:
      - inception
    restart: on-failure
    depends-on: 
      - wordpress
